name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
          fail-fast: false
          max-parallel: 3
          matrix:
            os:
              - ubuntu-24.04
              - windows-2022
              - macos-13  # x64 CPU
              - macos-14  # M1 CPU

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest poetry==1.8.4
        poetry install

    - name: Run tests
      run: |
        poetry run pytest

    - name: Build standalone apps
      run: |
        poetry run pyinstaller osh.spec

    - name: Zip the standalone apps
      run: |
        cd dist
        mkdir osh-binaries
        cp ./osh ./osh-display-list ./osh-binaries/
        cd osh-binaries
        zip ../osh_${{ matrix.os }}_${{ github.sha }}.zip *
